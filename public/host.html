<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyncMates - Authentification hôte</title>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/pages/host.css" />
  </head>
  <body class="page-host">
    <main>
      <h1>Connexion synchroniseur</h1>
      <p>
        Connecte-toi à ton synchroniseur pour gérer les participants et consulter les
        disponibilités.
      </p>

      <form id="host-login-form" method="post" action="#">
        <div>
          <label for="syncer-name">Nom ou identifiant du synchroniseur</label>
          <input
            id="syncer-name"
            name="syncerName"
            type="text"
            required
            autocomplete="off"
          />
        </div>

        <div>
          <label for="syncer-password">Mot de passe</label>
          <input
            id="syncer-password"
            name="syncerPassword"
            type="password"
            required
          />
        </div>

        <button type="submit">Se connecter</button>
      </form>
      <p id="host-login-feedback" aria-live="polite"></p>

      <section>
        <h2>Créer un synchroniseur</h2>
        <form id="create-syncer-form" method="post" action="#">
          <div>
            <label for="create-syncer-name">Nom du synchroniseur</label>
            <input
              id="create-syncer-name"
              name="createSyncerName"
              type="text"
            required
            />
          </div>

          <div>
            <label for="create-syncer-password">Mot de passe</label>
            <input
              id="create-syncer-password"
              name="createSyncerPassword"
              type="password"
            required
            />
          </div>

          <button type="submit">Créer le synchroniseur</button>
        </form>
        <p id="create-syncer-feedback" aria-live="polite"></p>
      </section>

      <p>
        <a href="index.html">Retour à l'accueil</a>
      </p>
    </main>
    <script src="js/maintenance.js" defer></script>
    <script src="js/host.js" defer></script>
  </body>
</html>
